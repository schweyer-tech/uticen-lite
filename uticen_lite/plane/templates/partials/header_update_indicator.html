{% if info %}
  <div id="header-update-indicator" class="update-indicator-wrap">
    {% if info.available %}
    <button type="button"
            class="update-indicator update-available"
            aria-label="Update available: {{ info.latest }}"
            title="Update available: {{ info.latest }}"
            aria-controls="update-modal"
            data-update-modal-open>
      <span class="indicator-dot"></span>
      <span class="sr-only">Update available: {{ info.latest }}</span>
    </button>
    <template id="update-modal-template">
      <div class="update-modal-body">
        <h2 id="update-modal-title">Update available: {{ info.latest }}</h2>
        <p class="lead">{{ info.message }}</p>
        <div class="page-actions">
          <button class="btn btn-sm btn-primary"
                  hx-post="/upgrade" hx-target="body" hx-swap="innerHTML"
                  hx-confirm="This will close the app and upgrade uticen-lite. Continue?">
            Update now
          </button>
          <button type="button" class="btn btn-sm btn-ghost" data-update-modal-close>
            Close
          </button>
        </div>
      </div>
    </template>
    {% else %}
    <button type="button"
            class="update-indicator up-to-date"
            aria-label="Up to date: {{ current_version }}"
            title="Up to date: {{ current_version }}"
            aria-controls="update-modal"
            data-update-modal-open>
      <span class="indicator-dot"></span>
      <span class="sr-only">Up to date: {{ current_version }}</span>
    </button>
    <template id="update-modal-template">
      <div class="update-modal-body">
        <h2 id="update-modal-title">Up to date: {{ current_version }}</h2>
        <p class="lead">{{ info.message }}</p>
        <div class="page-actions">
          <button type="button" class="btn btn-sm btn-ghost" data-update-modal-close>
            Close
          </button>
        </div>
      </div>
    </template>
    {% endif %}
  </div>
{% endif %}
