name: SonarQube Scan

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    runs-on: [self-hosted, sonarqube]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Produce coverage.xml so the scan can report line coverage (Sonar reads
      # it via sonar.python.coverage.reportPaths). An isolated venv keeps the
      # self-hosted runner's global site-packages untouched; the editable
      # install also makes the package metadata available so the CLI version
      # test resolves importlib.metadata.version("uticen-lite").
      #
      # The runner's bare `python3` is the macOS system 3.9, below the package's
      # >=3.11 floor, and actions/setup-python can't help: its macOS build is not
      # relocatable (hardcodes /Users/runner) so it dies on this self-hosted
      # runner. So: prefer any locally installed python3.1x, else fetch a pinned
      # *relocatable* CPython (astral python-build-standalone) into the job temp.
      - name: Run tests with coverage
        env:
          PBS_TAG: "20260623"
          PBS_VER: "3.12.13"
        run: |
          set -o pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          PY=""
          for c in python3.13 python3.12 python3.11 python3.14 python3; do
            if command -v "$c" >/dev/null 2>&1 \
               && "$c" -c 'import sys; sys.exit(0 if sys.version_info[:2] >= (3, 11) else 1)' 2>/dev/null; then
              PY="$c"; break
            fi
          done
          if [ -z "$PY" ]; then
            case "$(uname -m)" in
              arm64|aarch64) PBS_ARCH=aarch64 ;;
              x86_64)        PBS_ARCH=x86_64 ;;
              *) echo "::error::unsupported arch $(uname -m)"; exit 1 ;;
            esac
            url="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/cpython-${PBS_VER}+${PBS_TAG}-${PBS_ARCH}-apple-darwin-install_only.tar.gz"
            echo "No local Python >=3.11; fetching relocatable CPython: $url"
            curl -fsSL "$url" -o "${RUNNER_TEMP}/python.tar.gz"
            tar -xzf "${RUNNER_TEMP}/python.tar.gz" -C "${RUNNER_TEMP}"
            PY="${RUNNER_TEMP}/python/bin/python3"
          fi
          echo "Using $PY ($("$PY" --version 2>&1))"
          "$PY" -m venv .sonar-venv
          ./.sonar-venv/bin/pip install -q --upgrade pip
          ./.sonar-venv/bin/pip install -q -e ".[adapters,dev]"
          ./.sonar-venv/bin/pytest -q --cov=uticen_lite --cov-report=xml

      - name: SonarQube scan
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          sonar-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN"
