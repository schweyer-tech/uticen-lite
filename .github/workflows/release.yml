name: Release

# Triggered automatically on v* tags to build + verify the distributable.
# The publish step ONLY runs when a human explicitly triggers workflow_dispatch
# and the PYPI_API_TOKEN secret is available — it NEVER publishes on a plain
# push or tag push alone.
#
# RECOMMENDATION (future round, out of scope here): migrate the publish job to PyPI
# trusted publishing (OIDC) once the project owner creates the PyPI project + a
# pending publisher. That removes the long-lived PYPI_API_TOKEN: add
# `permissions: id-token: write` to the publish job and drop the `password:` input
# below. Flagged only — no change is made here.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI? (requires PYPI_API_TOKEN secret)"
        required: true
        type: boolean
        default: false

jobs:
  build-and-check:
    name: Build & verify distributable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install build + twine
        run: |
          uv venv --clear
          uv pip install build twine

      - name: Build wheel and sdist
        run: uv run --no-sync python -m build

      - name: twine check
        run: uv run --no-sync twine check dist/*

      - name: Smoke-test wheel import
        run: |
          uv pip install dist/*.whl
          uv run --no-sync python -c "import uticen_lite; from uticen_lite import Violation; print('wheel import OK')"

      - name: Confirm no compiled deps in wheel
        run: |
          uv run --no-sync python - <<'EOF'
          import zipfile, sys
          whl = next(__import__('pathlib').Path('dist').glob('*.whl'))
          with zipfile.ZipFile(whl) as z:
              record = z.read(next(n for n in z.namelist() if n.endswith('/RECORD'))).decode()
          bad = [l for l in record.splitlines() if 'pydantic' in l.lower()]
          if bad:
              print('ERROR: pydantic found in wheel RECORD:', bad, file=sys.stderr)
              sys.exit(1)
          print('No pydantic/pydantic_core in wheel RECORD — Pyodide-safe OK')
          EOF

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30

  publish:
    name: Publish to PyPI (MANUAL + TOKEN-GATED)
    needs: build-and-check
    runs-on: ubuntu-latest
    # This job is EXPLICITLY GATED — it runs only when:
    #   1. The workflow was triggered via workflow_dispatch (manual human action), AND
    #   2. The operator set publish=true in the dispatch inputs.
    # It NEVER runs on an automatic tag push alone.
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/uticen-lite/
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require an exact v* tag
        run: |
          git fetch --tags --force
          git describe --exact-match --match 'v*' --tags HEAD || {
            echo "::error::publish requires an exact v* tag on HEAD"; exit 1; }

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Tag matches package version
        # version is duplicated in pyproject.toml + __init__.py; this guard fails
        # the publish before upload so a future release can't ship a mislabeled wheel.
        # stdlib-only (tomllib) and runs before any install, so use --no-project
        # (no venv needed) rather than --no-sync.
        run: |
          PKG=$(uv run --no-project python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag v$TAG != pyproject version $PKG"; exit 1; }

      - name: Install twine
        run: |
          uv venv --clear
          uv pip install --upgrade twine

      # Reuse the exact dist that build-and-check already built + twine-checked, so
      # the published bytes ARE the verified bytes (no second-build drift).
      - name: Download verified dist
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Verify distribution
        run: uv run --no-sync twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PYPI_API_TOKEN must be set in the repository secrets.
          # If the secret is absent the publish step fails safely — it does NOT fall
          # back to any other credential or upload path.
          password: ${{ secrets.PYPI_API_TOKEN }}
