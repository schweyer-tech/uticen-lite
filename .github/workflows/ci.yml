name: CI

on:
  # Run on pushes to main (post-merge) and on every PR. A branch with an open PR is
  # covered by the pull_request event, so this avoids the double run that
  # `push: ["**"]` + `pull_request` caused.
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel superseded runs for the same branch / PR instead of letting stale runs finish.
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[adapters,dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy controlflow_sdk

      - name: Run tests
        run: pytest -q
