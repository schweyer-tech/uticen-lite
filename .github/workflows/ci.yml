name: CI

on:
  # Run on pushes to main (post-merge) and on every PR. A branch with an open PR is
  # covered by the pull_request event, so this avoids the double run that
  # `push: ["**"]` + `pull_request` caused.
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel superseded runs for the same branch / PR instead of letting stale runs finish.
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv + Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[adapters,dev]"

      - name: Lint with ruff
        run: uv run --no-sync ruff check .

      - name: Type-check with mypy
        run: uv run --no-sync mypy uticen_lite

      - name: Run tests
        run: uv run --no-sync pytest -q

  # Detect whether this change touches the control-plane web surface (or the
  # contract / bundle / schema it depends on). The browser e2e job below is
  # gated on this so it runs — and blocks — only on plane-relevant PRs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      plane: ${{ steps.filter.outputs.plane }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            plane:
              - 'uticen_lite/plane/**'
              - 'contract/**'
              - 'uticen_lite/bundle/**'
              - 'uticen_lite/schema/**'
              - 'tests/e2e/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'

  # Playwright browser smoke test (issue #13). Separate from the fast `test`
  # lane: installs the e2e extra + Chromium and drives a live controlplane. Runs
  # only when `changes` reports a plane-relevant diff, so it is present-and-
  # blocking exactly on the PRs the locked decision requires (and skipped — not
  # failing — on unrelated PRs). Branch protection should require this check via
  # the present-when-relevant pattern, not as a hard-required check that would
  # block on "skipped".
  e2e:
    needs: changes
    if: needs.changes.outputs.plane == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[plane,e2e]"

      - name: Install Playwright browser
        run: uv run --no-sync python -m playwright install --with-deps chromium

      - name: Run browser smoke test
        run: uv run --no-sync pytest tests/e2e -m browser
