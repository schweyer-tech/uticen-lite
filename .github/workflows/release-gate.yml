name: Release gate

# Enforces the standardized release process: only `staging` or a `release/*` branch may PR into
# main. Produces the `release-branch-gate` status check that Main Branch Protection requires.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-branch-gate:
    runs-on: [self-hosted, macOS]
    steps:
      - name: Enforce integration branch requirement
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_BRANCH" != "staging" && "$HEAD_BRANCH" != release/* ]]; then
            echo "::error::Only 'staging' or a 'release/*' branch can merge to main. Got: $HEAD_BRANCH"
            exit 1
          fi
          echo "Integration branch: $HEAD_BRANCH"
