# Visual-pipeline (graph) authoring of this control.
#
# Reshapes the demo so the one-click demo showcases the visual pipeline builder
# (#25) — a cross-source import / filter / join / test DAG — instead of the Python
# escape hatch. The importer stores this graph in the store-only `pipeline` column
# and COMPILES it to the existing bundle artifact (learning 0010): because the DAG
# has a Join it compiles to a generated test(pop, sources), so the bundle never
# learns the word "node". The companion test.py stays as documentation but is not
# the executed artifact once this sidecar is present.
#
# Shape: two parallel branches converge at a Join. The left branch narrows the
# access accounts to the ACTIVE ones; the right branch narrows the employee roster
# to the TERMINATED ones. The Join keeps active accounts whose employee_id exists
# among terminated employees, and the terminal Test flags every survivor.
#
# dtype note (learning 0011): `is_active` loads as boolean → matched with a real
# bool; `status` loads as text → matched with the string 'terminated'.
# Expected: 3 violations on the demo data (same as the Python test it replaces).
nodes:
  - id: acc
    type: import
    source_id: access_accounts
    narrative: System access accounts (primary population).
  - id: emp
    type: import
    source_id: employees
    narrative: HR employee roster.
  - id: active_accounts
    type: filter
    inputs: [acc]
    narrative: Keep only currently active accounts.
    config:
      logic: all
      conditions:
        - column: is_active
          op: eq
          value: true
  - id: terminated_employees
    type: filter
    inputs: [emp]
    narrative: Keep only terminated employees.
    config:
      logic: all
      conditions:
        - column: status
          op: eq
          value: terminated
  - id: active_for_terminated
    type: join
    inputs: [active_accounts, terminated_employees]
    narrative: Active accounts whose employee was terminated.
    config:
      mode: exists
      left_key: employee_id
      right_key: employee_id
  - id: flag
    type: test
    inputs: [active_for_terminated]
    narrative: Flag every active account linked to a terminated employee.
    config:
      logic: all
      severity: critical
      item_key_column: account_id
      description_template: >-
        Account '{account_id}' is active but linked employee '{employee_id}' has
        terminated status
      conditions:
        - column: account_id
          op: not_empty
