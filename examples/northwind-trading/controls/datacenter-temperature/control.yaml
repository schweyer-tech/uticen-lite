id: IT.ENV.1
title: Data Center Temperature Threshold
objective: >
  Ensure every in-scope data-center site operates within the ASHRAE-recommended
  temperature ceiling (≤ 27°C), so equipment is not exposed to heat stress that
  raises failure rates and threatens availability.
narrative: >
  Facilities monitors the outdoor/intake temperature at each data-center site.
  This control demonstrates Uticen Lite's "fetch from URL" on-ramp: the population
  was snapshotted once from the OpenWeatherMap API and frozen to a local CSV,
  then tested full-population like any other source. Any site reading above the
  27°C safe-operating ceiling at the snapshot time is flagged for an environmental
  review. (A deliberately light, real-world-data example — see the README.)
framework_refs:
  nist:
    - PE-14
risk:
  name: Data Center Over-Temperature
  description: >
    Operating IT equipment above the recommended temperature ceiling accelerates
    hardware degradation and raises the risk of thermal shutdowns and unplanned
    outages at the affected site.
  inherent_rating: medium
sources:
  - id: datacenter_weather
