sources:
  - id: journal_entries
    type: file
    title: Journal Entry Register
    description: General-ledger journal entry register for the period.
    completeness_accuracy: Extracted directly from the GL; total entry count reconciled to the trial-balance posting count.
    extract_date: "2026-03-31"
    config:
      path: data/journal_entries.csv
      format: csv
    key_config:
      mode: single
      columns:
        - entry_id
    column_mappings:
      - original_name: entry_id
        display_name: Entry ID
        data_type: text
        is_key: true
      - original_name: period
        display_name: Period
        data_type: text
        is_key: false
      - original_name: posting_date
        display_name: Posting Date
        data_type: date
        is_key: false
      - original_name: account
        display_name: Account
        data_type: text
        is_key: false
      - original_name: amount
        display_name: Amount
        data_type: number
        is_key: false
      - original_name: entry_type
        display_name: Entry Type
        data_type: text
        is_key: false
      - original_name: prepared_by
        display_name: Prepared By
        data_type: text
        is_key: false
      - original_name: reviewed_by
        display_name: Reviewed By
        data_type: text
        is_key: false

