{% if info %}
  <div id="header-update-indicator" class="update-indicator-wrap">
    {% if info.available %}
    <button type="button" class="update-indicator update-available" title="Update available: {{ info.latest }}">
      <span class="indicator-dot"></span>
      <span class="indicator-text">Update available</span>
    </button>
    <div class="update-popover" role="menu" aria-label="Update actions">
      <p class="update-popover-text">New version {{ info.latest }} is available.</p>
      <button class="btn btn-sm btn-primary"
              hx-post="/upgrade" hx-target="body" hx-swap="innerHTML"
              hx-confirm="This will close the app and upgrade controlflow-sdk. Continue?">
        Update now
      </button>
      <button class="btn btn-sm btn-ghost"
              hx-post="/updates/indicator/check"
              hx-target="#header-update-indicator"
              hx-swap="outerHTML">
        Re-check
      </button>
    </div>
    {% else %}
    <button type="button" class="update-indicator up-to-date" title="Current version: {{ current_version }}">
      <span class="indicator-dot"></span>
      <span class="indicator-text">{{ current_version }}</span>
    </button>
    <div class="update-popover" role="menu" aria-label="Update actions">
      <p class="update-popover-text">You are up to date.</p>
      <button class="btn btn-sm btn-ghost"
              hx-post="/updates/indicator/check"
              hx-target="#header-update-indicator"
              hx-swap="outerHTML">
        Check now
      </button>
    </div>
    {% endif %}
  </div>
{% endif %}
