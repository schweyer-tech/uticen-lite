<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Control Plane{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% set path = request.url.path %}
  <header class="app-header">
    <div class="app-header-inner">
      <a class="brand" href="/">
        <span class="brand-mark">ControlFlow</span>
        <span class="brand-sub">Control Plane</span>
      </a>
      <nav class="app-nav">
        <a class="nav-link {% if path == '/' or path.startswith('/controls') %}active{% endif %}" href="/">Controls</a>
        <a class="nav-link {% if path.startswith('/sources') %}active{% endif %}" href="/sources">Sources</a>
        <a class="nav-link {% if path.startswith('/export') %}active{% endif %}" href="/export">Export</a>
      </nav>
      <div class="app-header-project"><span class="chip">{{ project.name }}</span></div>
    </div>
  </header>
  <main>{% block body %}{% endblock %}</main>
  <footer class="app-footer">
    ControlFlow Control Plane · local authoring surface · created by
    <a href="https://schweyer.tech">schweyer.tech</a>
  </footer>
</body>
</html>
